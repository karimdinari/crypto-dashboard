<!doctype html>
<html lang="en">
  <head>
    <script>
      (function () {
        try {
          var t = localStorage.getItem('tigre-theme')
          document.documentElement.setAttribute(
            'data-theme',
            t === 'light' ? 'light' : 'dark',
          )
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark')
        }
      })()
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500&family=Roboto:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Tigre — Multi-Market Analytics Terminal</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
